name: Raise PR to Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    if: ${{ !startsWith(github.event.head_commit.message, 'sync-back:') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4

      - name: Sync to prod repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          PROD_REPO: vkpriyesh/prod-app
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.email "bot@yourdomain.com"
          git config --global user.name "Sync Bot"

          SRC="$GITHUB_WORKSPACE"
          CLONE_DIR="$RUNNER_TEMP/prod-repo"
          git clone https://x-access-token:${GH_PAT}@github.com/${PROD_REPO}.git "$CLONE_DIR"
          cd "$CLONE_DIR"

          BRANCH="sync/staging-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH

          rsync -av --delete --exclude='.git' --exclude='.github' --exclude='node_modules' "$SRC/" ./

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to sync — staging and prod are in sync."
            exit 0
          fi

          git commit -m "sync: from staging $(date +%Y-%m-%d)"
          git push origin $BRANCH

          gh pr create \
            --repo ${PROD_REPO} \
            --head $BRANCH \
            --base main \
            --title "Staging sync $(date +%Y-%m-%d)" \
            --body "Automated PR from staging repo"

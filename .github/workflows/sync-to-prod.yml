name: Raise PR to Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4

      - name: Sync to prod repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          PROD_REPO: YOUR_GITHUB_USERNAME/prod-app
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.email "bot@yourdomain.com"
          git config --global user.name "Sync Bot"

          git clone https://x-access-token:${GH_PAT}@github.com/${PROD_REPO}.git prod-repo
          cd prod-repo

          BRANCH="sync/staging-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH

          rsync -av --exclude='.git' --exclude='node_modules' --exclude='.github' ../ ./

          git add .
          git diff --staged --quiet || git commit -m "sync: from staging $(date +%Y-%m-%d)"
          git push origin $BRANCH

          gh pr create \
            --repo ${PROD_REPO} \
            --head $BRANCH \
            --base main \
            --title "Staging sync $(date +%Y-%m-%d)" \
            --body "Automated PR from staging repo"
